<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        //Armazenar dados no localStorage
        localStorage.setItem("nome", "Rogério");
        
        //Recuperar dados do localStorage

        console.log(nome); // Saída: "Rogério"


    </script>

</body>
