<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
   
*{
	margin: 0;
	padding: 0;
	font-family: Montserrat;
}

.container {
	padding: 40px;
	background-color: black;
	display: flex;
	gap: 20px;
}
.card {
	width: 200px;
	height: 200px;
	padding: 10px 20px;
	background-color: white;
	display: flex;
	flex-direction: column;
	justify-content: space-around;
}

.card p {
	width: 190px;
}

.card h3{
	margin-bottom: 10px;
}
.card span{
	font-size: 14px;
}
.card img {
	width: 150px;
}


</style>
<body>
    <div class="container">
        <div class="card">
            <h3>Samsung Galaxy M53</h3>
            <img src="https://a-static.mlcdn.com.br/800x560/smartphone-samsung-galaxy-s21-fe-128gb-preto-5g-6gb-ram-tela-64-cam-tripla-selfie-32mp/magazineluiza/233990000/e61df17d4e04c633f36b090c51002c08.jpg"/>
            <small>R$1.599,99</small>
        </div>
        <div class="card">
            <h3>Motorola Edge 30</h3>
            <img src="https://a-static.mlcdn.com.br/1500x1500/smartphone-motorola-edge-30-256gb-grafite-5g-octa-core-8gb-ram-65-cam-tripla-selfie-32mp/magazineluiza/235180600/dce1403134f9f60328da7ac5fa749769.jpg"/>
            <small>R$2.599,99</small>
        </div>
       
    </div>

</body>
</html>
