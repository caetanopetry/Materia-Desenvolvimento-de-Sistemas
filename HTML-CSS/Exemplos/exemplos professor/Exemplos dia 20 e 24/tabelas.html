<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo com tabelas</title>
</head>
<body>
    <h1>Relação de produtos</h1>
    <table border="5px">
        <thead>
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Preço (R$)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Teclado</td>
                <td>10</td>
                <td>100,00</td>
            </tr>
            <tr>
                <td>Mouse</td>
                <td>10</td>
                <td>80,00</td>
            </tr>
            <tr>
                <td>Monitor</td>
                <td>5</td>
                <td>900,00</td>
            </tr>
            <tr>
                <td>Celular</td>
                <td>50</td>
                <td>2000,00</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
