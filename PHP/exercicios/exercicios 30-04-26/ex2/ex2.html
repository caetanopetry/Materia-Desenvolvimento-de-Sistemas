<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Venda</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {        
            font-weight: bold;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 5px #4facfe;
        }

        input[type="checkbox"] {
            margin-right: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00c6ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cadastro de Venda</h2>

        <form action="ex2.php" method="POST">

            <label>Nome do Cliente:</label>
            <input type="text" name="nome_cliente" required>

            <label>
                <input type="checkbox" name="cliente_vip" value="sim">
                Cliente VIP
                <br>
            </label>

            <label>Nome do Produto:</label>
            <input type="text" name="nome_produto" required>

            <label>Quantidade em Estoque:</label>
            <input type="number" name="qtd_estoque" min="0" required>

            <label>Valor Unitário (R$):</label>
            <input type="number" step="0.01" name="valor_unitario" min="0" required>

            <label>Quantidade Vendida:</label>
            <input type="number" name="qtd_vendida" min="1" required>

            <button type="submit">Enviar</button>

        </form>
    </div>

</body>
</html>
