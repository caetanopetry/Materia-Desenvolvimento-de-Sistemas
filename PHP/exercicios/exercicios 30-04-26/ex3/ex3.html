<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuários</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 5px #4facfe;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00c6ff;
        }

    </style>

</head>
<body>

    <div class="container">

        <h2>Cadastro de Usuários</h2>

        <form action="ex3.php" method="POST">

            <label>Nome:</label>
            <input type="text" name="nome" required>

            <label>Telefone:</label>
            <input 
                type="number" 
                name="telefone"
                placeholder="Digite apenas números"
                required>
            <label>Email:</label>
            <input type="email" name="email" required>

            <button type="submit" name="acao" value="salvar">
                Salvar
            </button>

            <button type="submit" name="acao" value="mostrar">
                Mostrar Usuários
            </button>

        </form>

    </div>

</body>
</html>
