<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

<div class="container">

    <h2>Cadastro de Usuário</h2>

    <form action="cadastrar.php" method="POST">

        <label>Nome:</label>
        <input type="text" name="nm_usuario" required>

        <label>Login:</label>
        <input type="text" name="nm_login" required>

        <label>E-mail:</label>
        <input type="email" name="ds_email" required>

        <label>Senha:</label>
        <input type="password" name="ds_password" required>

        <button type="submit">Cadastrar</button>

    </form>

    <br>

    <a href="login.html">Já possui conta? Fazer Login</a>

</div>

</body>
</html>
