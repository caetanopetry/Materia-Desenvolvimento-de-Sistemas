<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Temperatura</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>Conversor de Temperatura</h1>

  <form action="converter.php" method="post" id="tempForm">

    <div>
      <label for="inTemp">Temperatura:</label>
      <input type="number" id="inTemp" step="0.1" placeholder="Ex: 25" name="temperatura" required>
    </div>

    <div>
      <label for="inTipo">Tipo de conversão:</label>
      <select id="inTipo" name="tipo" required>
        <option value="">Selecione</option>
        <option value="cToF">Celsius → Fahrenheit</option>
        <option value="fToC">Fahrenheit → Celsius</option>
      </select>
    </div>

    <div>
      <input type="submit" value="Converter">
    </div>

  </form>

  <h3></h3>

  <script src="js/conversor.js"></script>
</body>
</html>
