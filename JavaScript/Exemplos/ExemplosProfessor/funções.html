<body>
    <h1>Exemplo com funções 2</h1>
    <script>
        
        let largura = prompt("Digite a largura do terreno:  <br>")
        let comprimento = prompt("Digite o comprimento do terreno")
        // let area = calcularArea(largura, comprimento)
        // document.write("A área do terreno é: ", area, "m²")
        mensagem()
        document.write("O  terreno possui", calcularArea, "m² de area ")

        // exemplo de função com parametro e retorno
        function calcularArea (largura, comprimento) {
            let area = largura * comprimento
            return area
        }
        
        // funcao void - sem retorno e sem parâmetro

        function mensagem() {
            document.write("Exemplo de funçõse em JavaScript <br>")
        }

    </script>
