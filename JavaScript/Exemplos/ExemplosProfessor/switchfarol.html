<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let farol = 'Amarelo'
        switch(farol){
            case 'Vermelho':
                document.write("Pare")
                break;
            case 'Amarelo':
                document.write("Atenção")
                break;
            case 'Verde':
                document.write("Prossiga")
                break;
            default:
                document.write("Cor do farol errada")
        }

    </script>
</body>
</html>
