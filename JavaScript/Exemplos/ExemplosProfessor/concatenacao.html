<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo com concatenação</title>
</head>
<body>
    <h1>Exemplo com concatenação</h1>

    <script>
        let nome = prompt("Digite seu nome:")
        let idade = prompt("Digite sua idade:")
        documento.write("Olá " + nome + ", você tem " + idade + " anos.")

    </script>
</body>
</html>
