<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo com casting</h1>

    <script>
        let variavel1 = 10
        let variavel2 = 20
        let variavel3 = "Java Script"
        console.log(variavel1 + variavel2)
        /* 
        parseInt - Faz a conversão de string para inteiro
        parseFloat - Faz a conversão de string para float

        */
       let variavel10 = parseInt(variavel1)
       let variavel20 = parseFloat(variavel2)

        console.log(variavel10)
        console.log(variavel20)

        console.log(variavel10 + variavel20)
        //Conversão para string
        //toString - Converte um número para string

        console.log(variavel10.toString() + variavel20.toString())

    </script>

</body>
</html>
