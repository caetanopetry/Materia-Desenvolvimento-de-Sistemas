<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
    let numero = parseInt(prompt("Digite um número: "))
    switch (numero) {
        case 1:
            document.write("O número é 1")
            break;
        case 2:
            document.write("O número é 2")
            break;
        case 3:
            document.write("O número é 3")
            break;
        default:
            document.write("O número é diferente de 1, 2 e 3")
    }
</script>
</body>
</html>
