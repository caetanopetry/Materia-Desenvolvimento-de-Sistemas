    <!-- Modificações teste: -->
<script>
let palavra = "sair"
    const notas = []
    let soma = 0
    
    let entrada = prompt("(sair para parar o programa) Digite uma nota:")
    
    while (entrada !== palavra) {
        let nota = Number(entrada)
    
        if (!isNaN(nota)) {
            notas.push(nota)
        } else {
            alert("Digite um número válido!")
        }
    
        entrada = prompt("(sair para parar o programa) Digite uma nota:")
    }
    
    for (let nota of notas) {
        soma += nota
    }
    
    const media = soma / notas.length
    
    console.log("Média:", media.toFixed(1))
    
    </script>
