<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const numeros = [];
        let soma = 0;

        for (let i = 0; i < 5; i++) {
            let num = Number(prompt("Digite um número:"));
            numeros.push(num);
            soma += num;
        }

        console.log("Array:", numeros);
        console.log("Soma:", soma);
    </script>
</body>
</html>
