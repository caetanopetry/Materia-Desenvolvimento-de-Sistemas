<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores aritméticos</title>
</head>
<body>
    <script>
        let num1 = parseInt(prompt("Digite o primeiro número:"))
        let num2 = parseInt(prompt("Digite o segundo número:"))
        //Soma
        document.write("Soma entre: " + num1 + " e " + num2 + " = " + (num1 + num2)+ "<br>")
        
        //Subtração
        document.write("Subtração entre: " + num1 +  " e " + num2 + " = " + (num1 - num2)+ "<br>")
        
        //Multiplicação
        document.write("Multiplicação entre: " + num1 + " e " + num2 + " = " + (num1 * num2)+ "<br>")
        
        //Divisão
        document.write("Divisão entre: " + num1 + " e " + num2 + " = " + (num1 / num2)+ "<br>")
        
        //Módulo
        document.write("Módulo entre: " + num1 + " e " + num2 + " = " + (num1 % num2)+ "<br>")

        //Incremento
        document.write("Módulo entre: " + num1 + " e " + num2 + " = " + (num1 ++)+ "<br>")


        //Decremento
        document.write("Decremento entre: " + num1 + " e " + num2 + " = " + (num1 --)+ "<br>")

    </script>
</body>
</html>
