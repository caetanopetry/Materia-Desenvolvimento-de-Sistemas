<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Situação do Estudante</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>Verificar Situação do Estudante</h1>

  <form>

    <div>
      <label for="inNome">Nome do estudante:</label>
      <input type="text" id="inNome" required>
    </div>

    <div>
      <label for="inNota1">Primeira nota:</label>
      <input type="number" id="inNota1" step="0.1" required>
    </div>

    <div>
      <label for="inNota2">Segunda nota:</label>
      <input type="number" id="inNota2" step="0.1" required>
    </div>

    <div>
      <label for="inFreq">Frequência (%):</label>
      <input type="number" id="inFreq" step="1" placeholder="Ex: 80" required>
    </div>

    <div>
      <input type="submit" value="Verificar Situação">
    </div>

  </form>

  <h3 id = "inResp"></h3>

  <script src="exer4.js"></script>
</body>
</html>
