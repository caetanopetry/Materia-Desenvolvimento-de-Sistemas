<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Temperatura</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>Conversor de Temperatura</h1>

  <form>

    <div>
      <label for="inTemp">Temperatura:</label>
      <input type="number" id="inTemp" name="inTemp" step="0.1" placeholder="Ex: 25" required>
    </div>

    <div>
      <label for="inTipo">Tipo de conversão:</label>
      <select id="inTipo" required>
        <option value="">Selecione</option>
        <option value="cToF">Celsius → Fahrenheit</option>
        <option value="fToC">Fahrenheit → Celsius</option>
      </select>
    </div>

    <div>
      <input type="submit" value="Converter">
    </div>

  </form>

  <h3 id = "inResultado"></h3>

  <script src="exer3.js"></script>
</body>
</html>
