<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Grid - Bootstrap</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <h2 class="text-center mb-5">Tecnologias Web</h2>

        <div class="row">
            
            <div class="col-md-4">
                <div class="card">
                    <img src="001-html-5.png" class="card-img-top" alt="HTML">
                    <div class="card-body">
                        <h5 class="card-title">HTML</h5>
                        <p class="card-text">Linguagem de marcação utilizada para estruturar páginas web.</p>
                        <a href="https://html.com/" class="btn btn-primary">Saiba mais</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="002-css-3.png" class="card-img-top" alt="CSS">
                    <div class="card-body">
                        <h5 class="card-title">CSS</h5>
                        <p class="card-text">Linguagem usada para estilizar páginas web.</p>
                        <a href="https://developer.mozilla.org/pt-BR/docs/Web/CSS" class="btn btn-primary">Saiba mais</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="004-js.png" class="card-img-top" alt="JavaScript">
                    <div class="card-body">
                        <h5 class="card-title">JavaScript</h5>
                        <p class="card-text">Linguagem de programação utilizada para interatividade.</p>
                        <a href="https://www.javascript.com/" class="btn btn-primary">Saiba mais</a>
                    </div>
                </div>
            </div>

        </div>
        
        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-secondary">Voltar para a Introdução</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
